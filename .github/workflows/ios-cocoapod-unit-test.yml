name: iOS Unit Tests

on:
  push:
  workflow_dispatch:

concurrency:
  group: ios-unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKSPACE_PATH: AppAmbit.xcodeproj/project.xcworkspace
  FALLBACK_SCHEME: AppAmbit.App.Swift

jobs:
  unit_tests:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Prepare Xcode
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch

      - name: Pick scheme (prefer a Tests scheme if it exists)
        id: pick-scheme
        run: |
          python3 <<'PY'
          import json, os, subprocess, sys

          ws = os.environ["WORKSPACE_PATH"]
          fallback = os.environ["FALLBACK_SCHEME"]

          raw = subprocess.check_output(["xcodebuild","-list","-json","-workspace",ws]).decode("utf-8")
          data = json.loads(raw)
          schemes = (data.get("workspace") or {}).get("schemes") or []

          def is_test_scheme(s: str) -> bool:
            sl = s.lower()
            return ("test" in sl) and ("uitest" not in sl)

          preferred = [s for s in schemes if is_test_scheme(s)]
          chosen = preferred[0] if preferred else fallback

          if chosen not in schemes:
            print(f"Available schemes: {schemes}")
            raise SystemExit(f"Scheme '{chosen}' not found. Set FALLBACK_SCHEME or share the scheme in Xcode.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"scheme={chosen}\n")

          print(f"Chosen scheme: {chosen}")
          PY

      - name: Pick destination from xcodebuild (eligible simulator)
        id: pick-destination
        run: |
          python3 <<'PY'
          import os, re, subprocess, sys

          ws = os.environ["WORKSPACE_PATH"]
          scheme = os.environ["SCHEME"]

          cmd = ["xcodebuild","-workspace",ws,"-scheme",scheme,"-sdk","iphonesimulator","-showdestinations"]
          out = subprocess.check_output(cmd, stderr=subprocess.STDOUT, text=True)

          rx = re.compile(r"\{\s*platform:iOS Simulator,\s*id:([^,}]+),\s*OS:([^,}]+),\s*name:([^}]+)\s*\}")
          sims = []
          for m in rx.finditer(out):
            udid = m.group(1).strip()
            osver = m.group(2).strip()
            name = m.group(3).strip()
            sims.append((udid, osver, name))

          if not sims:
            print(out)
            raise SystemExit("No eligible iOS Simulator destinations from xcodebuild for this scheme.")

          def vkey(v: str):
            parts = re.findall(r"\d+", v)
            return tuple(int(x) for x in parts) if parts else (0,)

          iphones = [s for s in sims if s[2].lower().startswith("iphone")]
          pool = iphones if iphones else sims

          pool.sort(key=lambda x: (vkey(x[1]), x[2]), reverse=True)
          udid, osver, name = pool[0]

          destination = f"platform=iOS Simulator,id={udid}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"udid={udid}\n")
            f.write(f"destination={destination}\n")

          print(f"Selected destination: {destination} ({name} / iOS {osver})")
          PY
        env:
          SCHEME: ${{ steps.pick-scheme.outputs.scheme }}

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.pick-destination.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.pick-destination.outputs.udid }}" -b

      - name: Run unit tests (fallback to build if no test bundles)
        env:
          SCHEME: ${{ steps.pick-scheme.outputs.scheme }}
        run: |
          set +e
          set -o pipefail

          LOG="${{ runner.temp }}/xcodebuild.log"
          RESULT_BUNDLE="${{ runner.temp }}/xcode-results"
          DERIVED="${{ runner.temp }}/derived"

          xcodebuild -workspace "${{ env.WORKSPACE_PATH }}" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.pick-destination.outputs.destination }}" \
            -derivedDataPath "$DERIVED" \
            test \
            -resultBundlePath "$RESULT_BUNDLE" \
            | tee "$LOG"

          RC=${PIPESTATUS[0]}
          set -e

          if [ "$RC" -ne 0 ]; then
            if grep -q "There are no test bundles available to test." "$LOG"; then
              xcodebuild -workspace "${{ env.WORKSPACE_PATH }}" \
                -scheme "$SCHEME" \
                -configuration Debug \
                -sdk iphonesimulator \
                -destination "${{ steps.pick-destination.outputs.destination }}" \
                -derivedDataPath "$DERIVED" \
                build
            else
              exit "$RC"
            fi
          fi

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          path: |
            ${{ runner.temp }}/xcode-results
            ${{ runner.temp }}/xcodebuild.log
