name: CocoaPods Unit Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  unit_tests:
    name: Run unit tests on iOS simulator
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Detect available simulator
        id: detect-simulator
        run: |
          dest=$(python3 <<'PY'
          import json, subprocess
          preferred = "iPhone 15"
          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          data = json.loads(raw)
          device = None
          for runtime, devices in data.get("devices", {}).items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                  continue
              os_version = runtime.split(".iOS-")[-1].replace("-", ".")
              for dev in devices:
                  if not dev.get("isAvailable"):
                      continue
                  name = dev.get("name", "")
                  if "iPhone" not in name:
                      continue
                  candidate = (name, os_version)
                  if preferred in name:
                      device = candidate
                      break
                  if device is None:
                      device = candidate
              if device:
                  break
          if not device:
              raise SystemExit("No available iPhone simulator found")
          name, os_version = device
          print(f"platform=iOS Simulator,name={name},OS={os_version}")
          PY
          )
          dest=${dest//$'\n'/}
          echo "destination=${dest}" >> $GITHUB_OUTPUT

      - name: Run AppAmbit unit tests
        run: |
          xcodebuild -workspace AppAmbit.xcodeproj/project.xcworkspace \
            -scheme AppAmbit.App.Swift \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.detect-simulator.outputs.destination }}" \
            -derivedDataPath ${{ runner.temp }}/derived \
            test \
            -resultBundlePath ${{ runner.temp }}/xcode-results

      - name: Share iOS test artifacts
        if: always()
        run: |
          mkdir -p test-results
          xcrun xcresulttool export --type junit \
            --path ${{ runner.temp }}/xcode-results \
            --output-path test-results/TestResults.xml \
            || true

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          path: |
            ${{ runner.temp }}/xcode-results
            test-results/TestResults.xml
