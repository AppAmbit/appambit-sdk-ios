name: iOS Unit Tests

on:
  push:
  workflow_dispatch:

concurrency:
  group: ios-unit-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKSPACE_PATH: AppAmbit.xcodeproj/project.xcworkspace
  FALLBACK_SCHEME: AppAmbit.App.Swift

jobs:
  unit_tests:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Prepare Xcode
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch

      - name: Pick test scheme (must exist)
        id: pick-scheme
        run: |
          python3 <<'PY'
          import json, os, subprocess, sys

          ws = os.environ["WORKSPACE_PATH"]
          fallback = os.environ["FALLBACK_SCHEME"]

          raw = subprocess.check_output(["xcodebuild","-list","-json","-workspace",ws]).decode("utf-8")
          data = json.loads(raw)
          schemes = (data.get("workspace") or {}).get("schemes") or []

          def is_test_scheme(s: str) -> bool:
            sl = s.lower()
            return ("test" in sl) and ("uitest" not in sl)

          preferred = [s for s in schemes if is_test_scheme(s)]
          chosen = preferred[0] if preferred else fallback

          if chosen not in schemes:
            print(f"Available schemes: {schemes}")
            raise SystemExit(f"Chosen scheme '{chosen}' not found. Set FALLBACK_SCHEME or add/share a test scheme.")

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
            f.write(f"scheme={chosen}\n")

          print(f"Chosen scheme: {chosen}")
          PY

      - name: Detect available iPhone simulator (best available runtime) and output UDID destination
        id: detect-simulator
        run: |
          python3 <<'PY'
          import json, re, subprocess, os, sys

          def j(cmd):
            return json.loads(subprocess.check_output(cmd).decode("utf-8"))

          runtimes = j(["xcrun","simctl","list","runtimes","-j"]).get("runtimes", [])
          devices_by_runtime = j(["xcrun","simctl","list","devices","available","-j"]).get("devices", {})

          ios_runtimes = []
          for rt in runtimes:
            ident = rt.get("identifier","")
            if not ident.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
              continue
            if not rt.get("isAvailable", True):
              continue
            ver = rt.get("version") or (rt.get("name","").split("iOS")[-1].strip())
            ios_runtimes.append((ver, ident))

          def vkey(v):
            nums = re.findall(r"\d+", v)
            return tuple(int(x) for x in nums) if nums else (0,)

          ios_runtimes.sort(key=lambda x: vkey(x[0]), reverse=True)

          if not ios_runtimes:
            raise SystemExit("No available iOS simulator runtimes found on this runner image")

          preferred_models = ["iPhone 15", "iPhone 14", "iPhone 13", "iPhone 12"]

          chosen = None
          for ver, rid in ios_runtimes:
            devs = devices_by_runtime.get(rid, [])
            iphones = [
              d for d in devs
              if d.get("isAvailable")
              and d.get("udid")
              and "iPhone" in (d.get("name") or "")
            ]
            if iphones:
              for pref in preferred_models:
                for d in iphones:
                  if (d.get("name") or "").startswith(pref):
                    chosen = d
                    break
                if chosen:
                  break
              if not chosen:
                chosen = iphones[0]
              break

          if not chosen:
            devtypes = j(["xcrun","simctl","list","devicetypes","-j"]).get("devicetypes", [])
            dt = (
              next((t for t in devtypes if (t.get("name") or "") == "iPhone 15"), None)
              or next((t for t in devtypes if "iPhone" in (t.get("name") or "")), None)
            )
            if not dt:
              raise SystemExit("No iPhone device types found")
            ver, rid = ios_runtimes[0]
            udid = subprocess.check_output(["xcrun","simctl","create","CI iPhone", dt["identifier"], rid]).decode().strip()
            chosen = {"udid": udid, "name": dt.get("name") or "CI iPhone"}

          udid = chosen["udid"]
          destination = f"platform=iOS Simulator,id={udid}"

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
            f.write(f"udid={udid}\n")
            f.write(f"destination={destination}\n")

          print(f"Selected device: {chosen.get('name')} ({udid})")
          print(f"Destination: {destination}")
          PY

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.detect-simulator.outputs.udid }}" || true
          xcrun simctl bootstatus "${{ steps.detect-simulator.outputs.udid }}" -b

      - name: Run unit tests
        run: |
          set -e
          set -o pipefail

          LOG="${{ runner.temp }}/xcodebuild.log"

          xcodebuild -workspace "${{ env.WORKSPACE_PATH }}" \
            -scheme "${{ steps.pick-scheme.outputs.scheme }}" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.detect-simulator.outputs.destination }}" \
            -derivedDataPath "${{ runner.temp }}/derived" \
            test \
            -resultBundlePath "${{ runner.temp }}/xcode-results" \
            | tee "$LOG"

      - name: Upload iOS test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          path: |
            ${{ runner.temp }}/xcode-results
            ${{ runner.temp }}/xcodebuild.log
