name: CocoaPods Unit Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  unit_tests:
    name: Run unit tests on iOS simulator
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Detect available simulator
        id: detect-simulator
        run: |
          dest=$(python3 <<'PY'
          import subprocess, re
          data = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available"]).decode()
          current_os = None
          preferred = "iPhone 15"
          selected = None
          for line in data.splitlines():
              stripped = line.strip()
              if stripped.startswith("-- iOS "):
                  current_os = stripped.split("-- iOS ")[1].split(" --")[0]
              elif stripped.startswith("iPhone") and current_os:
                  name = stripped.split(" (")[0]
                  if preferred in name:
                      selected = (name, current_os)
                      break
                  if selected is None:
                      selected = (name, current_os)
          if selected:
              name, os = selected
              print(f"platform=iOS Simulator,name={name},OS={os}")
          else:
              raise SystemExit("No iPhone simulator destination found")
          PY
          )
          dest=${dest//$'\n'/}
          echo "destination=${dest:-platform=iOS Simulator,name=iPhone 17 Pro,OS=26.1}" >> $GITHUB_OUTPUT

      - name: Run AppAmbit unit tests
        run: |
          xcodebuild -workspace AppAmbit.xcodeproj/project.xcworkspace \
            -scheme AppAmbit.App.Swift \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.detect-simulator.outputs.destination }}" \
            -derivedDataPath ${{ runner.temp }}/derived \
            test \
            -resultBundlePath ${{ runner.temp }}/xcode-results

      - name: Share iOS test artifacts
        if: always()
        run: |
          mkdir -p test-results
          xcrun xcresulttool export --type junit \
            --path ${{ runner.temp }}/xcode-results \
            --output-path test-results/TestResults.xml \
            || true

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          path: |
            ${{ runner.temp }}/xcode-results
            test-results/TestResults.xml
