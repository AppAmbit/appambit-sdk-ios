name: CocoaPods Unit Test

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  unit_tests:
    name: Run unit tests on iOS simulator
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Detect available simulator
        id: detect-simulator
        run: |
          dest=$(python3 <<'PY'
          import json, subprocess, re

          valid_versions = set()
          show = subprocess.check_output(["xcodebuild", "-showsdks"]).decode()
          for line in show.splitlines():
              if "Simulator - iOS" in line:
                  match = re.search(r"Simulator - iOS ([0-9]+\\.[0-9]+)", line)
                  if match:
                      valid_versions.add(match.group(1))

          if not valid_versions:
              raise SystemExit("No iOS simulator SDK available")

          preferred = "iPhone 15"
          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          data = json.loads(raw)
          candidate = None
          for runtime, devices in data.get("devices", {}).items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                  continue
              os_version = runtime.split(".iOS-")[-1].replace("-", ".")
              if os_version not in valid_versions:
                  continue
              for dev in devices:
                  if not dev.get("isAvailable"):
                      continue
                  name = dev.get("name", "")
                  if "iPhone" not in name:
                      continue
                  pair = (name, os_version)
                  if preferred in name:
                      candidate = pair
                      break
                  if candidate is None:
                      candidate = pair
              if candidate:
                  break

          if not candidate:
              raise SystemExit("No compatible iPhone simulator found")

          name, os_version = candidate
          print(f"platform=iOS Simulator,name={name},OS={os_version}")
          PY
          )
          dest=${dest//$'\n'/}
          echo "destination=${dest}" >> $GITHUB_OUTPUT

      - name: Run AppAmbit unit tests
        run: |
          xcodebuild -workspace AppAmbit.xcodeproj/project.xcworkspace \
            -scheme AppAmbit.App.Swift \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "${{ steps.detect-simulator.outputs.destination }}" \
            -derivedDataPath ${{ runner.temp }}/derived \
            test \
            -resultBundlePath ${{ runner.temp }}/xcode-results

      - name: Share iOS test artifacts
        if: always()
        run: |
          mkdir -p test-results
          xcrun xcresulttool export --type directory \
            --path ${{ runner.temp }}/xcode-results \
            --output-path test-results \
            || true

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          path: |
            ${{ runner.temp }}/xcode-results
            test-results/TestResults.xml
